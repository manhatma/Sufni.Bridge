<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
  <g class="default">
    <!-- Top-left crosshair: horizontal tick at top of left bar -->
    <rect x="2" y="4.5" width="6.5" height="2" rx="0.5"/>
    <!-- Left solid bar -->
    <rect x="4" y="4" width="2" height="13" rx="0.5"/>
    <!-- Bottom solid bar -->
    <rect x="4" y="17" width="13" height="2" rx="0.5"/>
    <!-- Bottom-right crosshair: vertical tick at right end of bottom bar -->
    <rect x="17" y="15" width="2" height="6.5" rx="0.5"/>

    <!-- Dashed top edge -->
    <rect x="7.5" y="4.5" width="2.5" height="1.5" rx="0.3"/>
    <rect x="11.5" y="4.5" width="2.5" height="1.5" rx="0.3"/>
    <rect x="15.5" y="4.5" width="1.5" height="1.5" rx="0.3"/>

    <!-- Dashed right edge -->
    <rect x="17.5" y="7.5" width="1.5" height="2.5" rx="0.3"/>
    <rect x="17.5" y="11.5" width="1.5" height="2.5" rx="0.3"/>
    <rect x="17.5" y="15" width="1.5" height="1.5" rx="0.3"/>
  </g>
</svg>
